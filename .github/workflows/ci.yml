name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# Cancel in-flight runs on the same ref when a newer push arrives.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-lint:
    name: ruff (api + sdk)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Pin ruff to match the pyproject.toml declaration (>=0.6,<0.7).
      # Ruff ships new default lints in minor releases; an unpinned install
      # on CI drifts away from developer machines and surprises PRs with
      # "CI red / local green" failures.
      - run: pip install 'ruff>=0.6,<0.7'
      - run: ruff check api/
      - run: ruff check sdk/

  python-tests:
    name: pytest (api) — ${{ matrix.backend }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        backend: [sqlite, postgres]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: langperf
          POSTGRES_PASSWORD: langperf
          POSTGRES_DB: langperf_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U langperf"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ./api[dev] -e ./sdk
      - name: Run pytest (sqlite)
        if: matrix.backend == 'sqlite'
        working-directory: api
        run: pytest -x -q
      - name: Run pytest (postgres)
        if: matrix.backend == 'postgres'
        working-directory: api
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://langperf:langperf@localhost:5432/langperf_test
        run: pytest -x -q

  web-lint:
    name: eslint + tsc + vitest (web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm run lint
        working-directory: web
      - run: npm run typecheck
        working-directory: web
      - run: npm run test:unit
        working-directory: web
